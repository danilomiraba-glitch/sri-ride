<svg xmlns="http://www.w3.org/2000/svg" width="180" height="20">

  <defs>
    <clipPath id="clip">
      <rect width="180" height="20" rx="4"></rect>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Amarillo -->
    <rect x="0" y="0" width="90" height="20" fill="#FFD100"></rect>

    <!-- Azul -->
    <rect x="90" y="0" width="45" height="20" fill="#0033A0"></rect>

    <!-- Rojo -->
    <rect x="135" y="0" width="45" height="20" fill="#D52B1E"></rect>
  </g>

  <!-- Sombra -->
  <text x="90" y="14" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="11" fill="#000" opacity="0.25">
    ECUADOR
  </text>

  <!-- Texto principal -->
  <text x="90" y="13" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="11" fill="#ffffff" font-weight="bold">
    ECUADOR
  </text>

</svg>