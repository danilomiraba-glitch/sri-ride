<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RIDE</title>
<style>
__FONT-FACE__
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--red:#5f6b78;--dark:#1f252c;--gray-light:#f4f6f8;--gray-mid:#d7dde4;--gray-text:#5e6872;--white:#fff;--font:'IBM Plex Mono',monospace;--font-cond:'IBM Plex Mono',monospace;--sz-label:6.6pt;--sz-value:7.4pt;--sz-small:6.3pt;--lh-tight:1.2}body{font-family:var(--font);background:#e6eaee;display:flex;flex-direction:column;align-items:center;padding:14pt;gap:0;min-height:100vh;line-height:var(--lh-tight)}.ride-page{width:210mm;background:var(--white);position:relative;box-shadow:0 4pt 16pt rgba(22,30,39,0.14);page-break-before:auto}.corner-tr,.corner-br{display:none}.cabecera-mini{display:grid;grid-template-columns:100pt 1fr auto;align-items:center;gap:0;border-bottom:1.5pt solid var(--red);padding:6pt 12pt 6pt 10pt;position:relative;z-index:1}.cabecera-mini .mini-logo{padding-right:12pt;border-right:1pt solid var(--gray-mid)}.cabecera-mini .mini-logo .logo-box{width:78pt;height:30pt}.cabecera-mini .mini-logo .logo-img{max-width:85%;max-height:85%}.logo-box{background:transparent;border:0;display:flex;align-items:center;justify-content:center;font-size:var(--sz-small);color:var(--gray-text);border-radius:2pt;text-transform:uppercase;letter-spacing:.5pt}.logo-img{display:block;max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain}.logo-placeholder{line-height:1.2;text-align:center}.cabecera-mini .mini-doc{padding:0 10pt;display:flex;flex-direction:column;gap:2pt}.mini-title{font-family:var(--font-cond);font-size:13pt;font-weight:900;color:var(--red);text-transform:uppercase;line-height:1}.mini-subtitle{font-size:7.5pt;font-weight:700;color:var(--gray-text);text-transform:uppercase;letter-spacing:.4pt}.mini-ref{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:2pt}.mini-ref-label{font-size:7pt;font-weight:700;text-transform:uppercase;letter-spacing:.4pt;color:var(--gray-text)}.mini-ref-value{font-family:var(--font-cond);font-size:7.5pt;font-weight:700;color:var(--dark);letter-spacing:.3pt;background:#f4f6f8;padding:2pt 7pt;border-radius:2pt;border:1pt solid var(--gray-mid)}.anexo-tag{display:inline-block;font-size:7pt;font-weight:700;text-transform:uppercase;letter-spacing:.5pt;color:var(--white);background:#4f5d6b;padding:2pt 8pt;border-radius:2pt;margin-bottom:2pt}.barcode-section{width:289.89px;height:25px;overflow:hidden;display:flex;align-items:center;justify-content:center;background-color:white;margin:0 auto;padding:0}.barcode-svg{width:100%;height:auto;display:block}.anexo-seccion-header{background:#edf2f6;padding:3pt 12pt;display:flex;align-items:center;gap:10pt;border-bottom:1pt solid var(--gray-mid)}.anexo-seccion-header .anx-numero{font-family:var(--font-cond);font-size:18pt;font-weight:900;color:#4f5d6b;line-height:1}.anexo-seccion-header .anx-info{display:flex;flex-direction:column;gap:0}.anx-titulo{font-family:var(--font-cond);font-size:10pt;font-weight:700;color:#2e3741;text-transform:uppercase;letter-spacing:.5pt}.anx-subtitulo{font-size:7.5pt;color:#6d7885;letter-spacing:.3pt}.anx-referencia-banda{background:#f4f7fa;border-bottom:1pt solid #ccd5df;padding:3pt 12pt;display:flex;gap:14pt;flex-wrap:wrap;align-items:center}.anx-ref-item{display:flex;flex-direction:column;gap:0}.anx-ref-label{font-size:6.5pt;font-weight:700;text-transform:uppercase;letter-spacing:.4pt;color:#5a6875}.anx-ref-value{font-family:var(--font-cond);font-size:8.5pt;font-weight:700;color:var(--dark)}.guia-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;padding:4pt 10pt}.guia-item{padding:4pt 8pt 4pt 0}.guia-item:empty{display:none}.guia-label{font-size:var(--sz-label);font-weight:700;text-transform:uppercase;letter-spacing:.3pt;color:var(--gray-text);margin-bottom:1pt}.guia-value{font-size:var(--sz-value);font-weight:600;color:var(--dark)}.anx-subseccion{border-top:1pt solid var(--gray-mid)}.anx-subseccion-header{background:#f2f5f8;padding:3pt 12pt;font-family:var(--font-cond);font-size:8pt;font-weight:700;text-transform:uppercase;letter-spacing:.6pt;color:var(--gray-text);border-bottom:1pt solid var(--gray-mid)}.guia-destinos{padding:0 12pt 6pt}table.t-destinos{width:100%;border-collapse:collapse;font-size:var(--sz-label)}table.t-destinos thead th{background:#f0f0f0;font-size:7pt;font-weight:700;text-transform:uppercase;letter-spacing:.3pt;color:var(--gray-text);padding:3pt 8pt;text-align:left;border-bottom:1pt solid var(--gray-mid)}table.t-destinos tbody td{padding:4pt 8pt;font-size:var(--sz-value);border-bottom:1pt solid var(--gray-mid);color:var(--dark)}table.t-destinos tbody td.c{text-align:center}.anx-footer{border-top:1pt solid var(--gray-mid);padding:3pt 12pt;display:flex;justify-content:space-between;align-items:center;font-size:7pt;color:var(--gray-text);background:#f4f6f8}.anx-footer strong{color:var(--dark)}@media print{body{background:0;display:block;padding:0;gap:0}.ride-page{box-shadow:none;width:210mm;overflow:visible;margin:0}.cabecera-mini{page-break-inside:avoid;break-inside:avoid}.anx-footer{page-break-inside:avoid;break-inside:avoid}table.t-destinos tbody tr{page-break-inside:avoid;break-inside:avoid}}@media screen and (max-width:900px){body{padding:8pt}.ride-page{width:100%;max-width:210mm;overflow-x:auto}}
</style>  
</head>

</body>
</html>
